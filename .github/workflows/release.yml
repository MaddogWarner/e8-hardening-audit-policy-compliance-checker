name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: |
          zip -j "E8-HardeningTool-${{ steps.version.outputs.version }}.zip" \
            starthere.ps1 \
            essential8compliancecheck.ps1 \
            mdeexclusionsassess.ps1 \
            auditpolicyassess.ps1 \
            README.md \
            CHANGELOG.md \
            LICENSE

      - name: Extract release notes
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - << 'PYEOF' > release_notes.txt
          import re, os
          version = os.environ['RELEASE_VERSION']
          text = open('CHANGELOG.md').read()
          pattern = r'^## \[' + re.escape(version) + r'\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL | re.MULTILINE)
          print(m.group(1).strip() if m else 'See CHANGELOG.md for details.')
          PYEOF
          [ -s release_notes.txt ] || echo "See CHANGELOG.md for details." > release_notes.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          files: "E8-HardeningTool-${{ steps.version.outputs.version }}.zip"
          draft: false
          prerelease: false
